name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests scripts
      - name: Tests
        run: pytest tests/ -q

  scientific-regression:
    # Regenerates every result from scratch and fails if any number moved.
    # This is the gate that makes "every number is written by code" enforceable.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (CPU torch)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Reproduce + verify result hashes
        run: make verify
      - name: Upload regenerated results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
